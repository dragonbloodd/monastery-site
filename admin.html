<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка</title>
</head>

<body>

<h2>Добавить новость</h2>
<input id="newsInput">
<button onclick="addNews()">Добавить</button>

<h2>Расписание</h2>
<textarea id="schedule"></textarea>
<button onclick="saveSchedule()">Сохранить</button>

<h2>Благотворительность</h2>
<textarea id="charity"></textarea>
<button onclick="saveCharity()">Сохранить</button>

<script>
function addNews(){
    let news = JSON.parse(localStorage.getItem("news")) || [];
    news.push(document.getElementById("newsInput").value);
    localStorage.setItem("news", JSON.stringify(news));
}

function saveSchedule(){
    localStorage.setItem("schedule", document.getElementById("schedule").value);
}

function saveCharity(){
    localStorage.setItem("charity", document.getElementById("charity").value);
}
</script>

</body>
</html>
